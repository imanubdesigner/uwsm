# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, manu-swayosd-client --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, manu-swayosd-client --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, manu-swayosd-client --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, manu-swayosd-client --input-volume mute-toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, manu-brightness-display +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, manu-brightness-display 5%-
bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, manu-brightness-keyboard up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, manu-brightness-keyboard down
bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, manu-brightness-keyboard cycle
bindld = ,XF86TouchpadToggle, Toggle touchpad, exec, manu-toggle-touchpad
bindld = ,XF86TouchpadOn, Enable touchpad, exec, manu-toggle-touchpad on
bindld = ,XF86TouchpadOff, Disable touchpad, exec, manu-toggle-touchpad off

# Precise 1% multimedia adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, manu-swayosd-client --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, manu-swayosd-client --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, manu-brightness-display +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, manu-brightness-display 1%-

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, manu-swayosd-client --playerctl next
bindld = , XF86AudioPause, Pause, exec, manu-swayosd-client --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, manu-swayosd-client --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, manu-swayosd-client --playerctl previous

# Switch audio output with Super + Mute
bindld = SUPER, XF86AudioMute, Switch audio output, exec, manu-cmd-audio-switch
