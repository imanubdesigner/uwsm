#                              by Manu

# Variables
$mainMod = SUPER

# Main Programs
bindd = SUPER ALT, R, Refresh your Waybar, exec, manu-restart-waybar
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(manu-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(manu-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, T, Activity, exec, manu-launch-btop
bindd = SUPER, B, Open Your Default Browser, exec, manu-launch-browser
bindd = SUPER SHIFT, B, Open Browser in private section, exec, manu-launch-browser --private
bindd = SUPER SHIFT, O, Obsidian, exec, manu-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER, N, Open Your Editor, exec, manu-launch-editor
bindd = SUPER, E, File Manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER, SPACE, Open Walker for Apps, exec, manu-launch-walker
bindd = SUPER ALT, SPACE, Open Main Menu, exec, manu-menu
bindd = SUPER SHIFT, E, Emoji menu with Walker, exec, manu-launch-walker -m symbols
bindd = SUPER SHIFT, I, Install Manu, exec, manu-menu install
bindd = SUPER ALT, B, Helium Browser, exec, uwsm-app -- helium-browser
bindd = SUPER, K, Keybindings, exec, manu-menu-keybindings

# Aesthetics
bindd = SUPER CTRL, SPACE, Background menu, exec, manu-menu background
bindd = SUPER SHIFT, SPACE, Waybar Toggle,exec, manu-toggle-waybar
bindd = SUPER SHIFT CTRL, SPACE, Theme menu, exec, manu-menu theme
bindd = SUPER, BACKSPACE, Toggle window transparency, exec, manu-hyprland-active-window-transparency-toggle
bindd = SUPER SHIFT, BACKSPACE, Toggle workspace gaps, exec, manu-hyprland-window-gaps-toggle
bindd = SUPER CTRL, BACKSPACE, Toggle single-window square aspect, exec, manu-hyprland-window-single-square-aspect-toggle

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, manu-toggle-notification-silencing
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore

# Toggle
bindd = SUPER CTRL, P, Toggle switch Power Profiles, exec, manu-menu power
bindd = SUPER CTRL, I, Toggle locking on idle, exec, manu-toggle-idle
bindd = SUPER CTRL, N, Toggle nightlight, exec, manu-toggle-night

# Multimedia & Utilities
bindd = SUPER SHIFT ALT, M, Music TUI, exec, manu-launch-or-focus-tui cliamp
bindd = SUPER, M, Music, exec, manu-launch-or-focus spotify-launcher
bindd = SUPER SHIFT, L, Hyprlock if you want, exec, manu-launch-or-focus hyprlock
bindd = SUPER, ESCAPE, Power Menu, exec, manu-menu system

# Chromium Web Apps
bindd = SUPER SHIFT, G, WhatsApp, exec, manu-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT, Y, YouTube, exec, manu-launch-webapp "https://www.youtube.com/"
bindd = SUPER SHIFT, X, X App, exec, manu-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Write Post, exec, manu-launch-webapp "https://x.com/compose/post"
bindd = SUPER SHIFT, A, ChatGPT, exec, manu-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, manu-launch-webapp "https://grok.com"
bindd = SUPER SHIFT ALT, T, Twitch, exec, manu-launch-webapp "https://twitch.tv"
bindd = SUPER SHIFT, D, DAZN, exec, manu-launch-webapp "https://dazn.com/"
bindd = SUPER SHIFT, S, Spotify Web, exec, manu-launch-webapp "https://open.spotify.com/"
bindd = SUPER SHIFT, R, Reddit, exec, manu-launch-webapp "https://reddit.com/"
bindd = SUPER SHIFT, N, Netflix, exec, manu-launch-webapp "https://netflix.com/"

# Captures
bindd = , HOME, Screenshot with editing, exec, manu-capture-screenshot
bindd = ALT, HOME, Screenrecording, exec, manu-menu screenrecord
bindd = SUPER ALT, P, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER CTRL, HOME, Extract text (OCR) from screenshot, exec, manu-capture-text-extraction

# File sharing
bindd = SUPER CTRL, S, Share, exec, manu-menu share

# Waybar-less information
bindd = SUPER CTRL, T, Show time, exec, notify-send "пђє  Current Time" "пђІ $(printf '%s\nој·  Date: %s' "$(date +"%A %H:%M")" "$(date +"%d %B W%V %Y")")"

# Control panels
bindd = SUPER CTRL, A, Audio controls, exec, manu-launch-audio
bindd = SUPER SHIFT CTRL, B, Toggle Bluetooth, exec, manu-toggle-bluetooth
bindd = SUPER CTRL, B, Bluetooth controls, exec, manu-launch-bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, manu-launch-wifi

# Dictation
bindd = SUPER CTRL, X, Toggle dictation, exec, voxtype record toggle

bindd  = , F9, Start dictation (push-to-talk), exec, voxtype record start
binddr = , F9, Stop dictation (push-to-talk),  exec, voxtype record stop

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

