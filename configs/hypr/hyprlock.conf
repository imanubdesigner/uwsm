# Font: Adobe SF Pro Family 
source = $HOME/.config/hypr/colors.conf


# BACKGROUND
background {
    monitor =
    path = ~/.local/share/manu/current_wallpaper
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    ignore_empty_input = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.3 
    dots_spacing = 0.2 
    dots_center = true
    outer_color = $primary
    inner_color = rgba($surface_rgb, 0.60)
    font_color = $on_surface
    check_color = $secondary
    fail_color = $error
    fail_text =
    fail_transition = 100
    fade_on_empty = true
    fade_timeout = 500
    font_family = SF Pro Text Bold
    placeholder_text = 
    hide_input = false
    position = 0, -225
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = $on_surface
    font_size = 130
    font_family = SF Pro Rounded Heavy
    position = 0, 240
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = $on_surface
    font_size = 20
    font_family = SF Pro Rounded Light Italic
    position = 0, 130
    halign = center
    valign = center
}

# Profie-Photo
image {
    monitor =
    path = /home/manu/.config/hypr/modules/hyprlock/avatar/anime.png
    border_color = $primary
    border_size = 2
    size = 150
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 0
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hey, $USER
    color = $on_surface
    font_size = 25
    font_family = SF Pro Rounded Regular
    position = 0, -130
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(manu-sniffer-songs)" 
    color = $on_surface_variant
    font_size = 18
    font_family = SF Pro Rounded Bold
    position = 0, 60
    halign = center
    valign = bottom
}
